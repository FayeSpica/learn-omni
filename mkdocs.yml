site_name: Learn Omni
site_description: omni 学习笔记与零散知识库
site_author: FayeSpica
site_url: https://fayespica.github.io/learn-omni/

repo_name: FayeSpica/learn-omni
repo_url: https://github.com/FayeSpica/learn-omni
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search:
      lang:
        - zh
        - en
  - tags

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/FayeSpica

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - LLM 基础:
      - llm-basics/index.md
      - 每生成一个 Token 的 KV Cache 显存: llm-basics/kv-cache-per-token.md
      - 碎片知识:
          - llm-basics/snippets/index.md
  - 生成模型基础:
      - generative-basics/index.md
      - DiT 是什么，核心流程: generative-basics/dit.md
      - 碎片知识:
          - generative-basics/snippets/index.md
  - vLLM:
      - vllm/index.md
      - vLLM IR 是什么：从 CustomOp 的困境说起: vllm/vllm-ir-and-customop.md
      - 图模式：eager / PIECEWISE / FULL: vllm/cudagraph-modes.md
      - 碎片知识:
          - vllm/snippets/index.md
  - vllm-ascend:
      - vllm-ascend/index.md
      - 碎片知识:
          - vllm-ascend/snippets/index.md
          - 昇腾量化特性支持速查: vllm-ascend/snippets/ascend-quantization.md
          - 昇腾代次与原生低精度格式(A2/A3/A5·950): vllm-ascend/snippets/ascend-generations-low-precision.md
  - vllm-omni:
      - vllm-omni/index.md
      - vLLM/Ascend/Omni 模块导图: vllm-omni/vllm-omni-npu.md
      - Qwen3-Omni 在 NPU 上是怎么跑起来的: vllm-omni/qwen3-omni-npu.md
      - 嵌套图捕获为什么不行（#4519）: vllm-omni/nested-graph-capture.md
      - Omni 平台无关/相关解耦：现状与演进: vllm-omni/platform-decoupling.md
      - 以 Qwen3-Omni 拆解核心组件与请求流转: vllm-omni/components-request-flow.md
      - platforms/npu 架构导读: vllm-omni/npu-platform-architecture.md
      - 碎片知识:
          - vllm-omni/snippets/index.md
          - npu_model_runner 上游适配困境与解耦: vllm-omni/snippets/npu-runner-decoupling.md
